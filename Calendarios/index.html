<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuadro de texto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="editor">
      <div class="toolbar" aria-label="Barra de herramientas del editor">
        <button type="button" class="tool-button" data-command="bold" title="Negrita">
          <strong>B</strong>
        </button>
        <button type="button" class="tool-button" data-command="italic" title="Cursiva">
          <em>I</em>
        </button>
        <button type="button" class="tool-button" data-command="underline" title="Subrayado">
          <u>U</u>
        </button>
        <button type="button" class="tool-button" data-command="insertUnorderedList" title="Lista">
          Lista
        </button>
        <button type="button" class="tool-button" data-command="justifyLeft" title="Alinear a la izquierda">
          Izq
        </button>
        <button type="button" class="tool-button" data-command="justifyCenter" title="Centrar">
          Centro
        </button>
        <button type="button" class="tool-button" data-command="justifyRight" title="Alinear a la derecha">
          Der
        </button>
      </div>
      <div
        class="text-box"
        contenteditable="true"
        role="textbox"
        aria-multiline="true"
        data-placeholder="Escribe aqui..."
      ></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
